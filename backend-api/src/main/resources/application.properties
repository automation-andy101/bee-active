spring.application.name=bee-active-api

spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/bee_active_db
spring.datasource.username=bee_active_user
spring.datasource.password=bee_active_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

